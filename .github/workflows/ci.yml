name: CI/CD - Parcial Valero

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ── JOB 1: Lint + Tests ─────────────────────────────────────────────────
  test:
    name: Node.js - lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "app/package-lock.json"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint || echo "Lint warnings ignorados"

      - name: Unit + Integration Tests
        env:
          NODE_ENV: test
        run: npm test -- --ci --reporters=default

  # ── JOB 2: Terraform validate ────────────────────────────────────────────
  terraform:
    name: Terraform fmt + validate
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init (backend=false)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_key_pair_name: "vockey"
        run: terraform validate

  # ── JOB 3: Deploy (solo en push a main) ─────────────────────────────────
  deploy:
    name: Deploy - actualizar app en EC2
    runs-on: ubuntu-latest
    needs: [test, terraform]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EC2 instance IDs
        id: instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=parcial-valero-rincon" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text | tr '\t' ' ')
          echo "INSTANCE_IDS=$INSTANCE_IDS" >> "$GITHUB_OUTPUT"
          echo "Instancias encontradas: $INSTANCE_IDS"

      - name: Deploy app via SSM Run Command
        run: |
          for INSTANCE_ID in ${{ steps.instances.outputs.INSTANCE_IDS }}; do
            echo "Desplegando en $INSTANCE_ID ..."
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=[
                "cd /opt/app",
                "git pull origin main",
                "npm ci --omit=dev",
                "sudo systemctl restart node-app"
              ]' \
              --comment "Deploy desde GitHub Actions - commit ${{ github.sha }}" \
              --output text
          done

      - name: Verify deployment health
        run: |
          echo "Esperando 15s para que el servicio reinicie..."
          sleep 15
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[].DNSName" \
            --output text | tr '\t' '\n' | grep -i parcial | head -1)
          echo "ALB DNS: $ALB_DNS"
          if [ -z "$ALB_DNS" ]; then
            echo "⚠️ No se encontró el ALB, saltando health check"
            exit 0
          fi
          curl -f "http://${ALB_DNS}/health" && echo "✅ Health check OK" || echo "⚠️ Health check falló"
